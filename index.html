<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    <style>
        html {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
            flex: 1;
        }

        #map-container {
            flex: 1;
            height: 100vh;
            position: relative;
        }

        .maplibregl-canvas-container {
            overflow: clip;
            height: 100vh;
        }

        .maplibregl-control-container {
            position: fixed;
            top: 0px;
            left: 0px;
            right: 0px;
            bottom:auto
        }

        .maplibregl-ctrl-bottom-right {
            position: fixed;
            bottom: 10px;
            right: 10px;
        }

        .maplibregl-ctrl-top-right {
            position: fixed;
            top: 10px;
            right: 10px;
        }

        .maplibregl-ctrl-group {
            display: flex;
            flex-direction: column;
        }

        .maplibregl-ctrl-zoom-in::before {
            content: '+';
            font-size: large;
        }

        .maplibregl-ctrl-zoom-out::before {
            content: '-';
            font-size: large;
        }

        .maplibregl-ctrl-compass::before {
            content: '⥈';
            font-size: large;
            cursor: all-scroll;
        }

        .overlay, .maplibregl-ctrl {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            padding: 4px;
            border: 1px solid #888;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .maplibregl-marker {
            cursor: all-scroll;
            position: fixed;
            top: 0;
            left: 0;
            display: none;
        }

        .edit-mode .maplibregl-marker {
            display: block;
        }

        .maplibregl-marker.point-marker {
            width: 16px;
            height: 16px;
            background-color: cornflowerblue;
            border: 2px solid #555;
            border-radius: 50%;
        }

        .maplibregl-marker.halfpoint-marker {
            width: 12px;
            height: 12px;
            background-color: #99bbff;
            border: 2px solid #555;
            border-radius: 50%;
        }

        #territory-list {
            max-height: 50%;
            overflow-y: auto;
            margin-bottom: 4px;
        }

        territory-list-item {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
        }

        territory-list-item.selected {
            background-color: cornflowerblue;
        }


    </style>
</head>
<body class="edit-mode">
    <div id="map-container"></div>
    <div class="overlay" style="position: fixed; top: 10px; left: 10px;">
        <label>Tryb edycji: <input type="checkbox" id="edit-mode-toggle" onchange="toggleEditMode(this.checked)" checked></label>
        <button id="undo-button" onclick="performUndo()" title="Cofnij">↩</button>
        <button id="redo-button" onclick="performRedo()" title="Ponów">↪</button>

        <details>
            <summary>Dane terenu:</summary>
            <form id="territory-form">
                <p><label>Numer: <input id="number-input" type="number" onchange="changeNumber(this.value)"></label></p>
                <p><label>Nazwa: <input id="name-input" type="text" onchange="changeName(this.value)"></label></p>
                <p><label>Wypełnienie: <input id="fill-input" type="color" onchange="changeFillColor(this.value)"></label></p>
                <p><label>Obramowanie: <input id="stroke-input" type="color" onchange="changeStrokeColor(this.value)"></label></p>
                <p><label>Grubość kreski: <input id="thickness-input" type="range" min="1" step="0.1" max="10" onchange="changeStrokeWidth(this.value)"></label></p>
                <p><label>Przezroczystość: <input id="opacity-input" type="range" min="0" step="0.01" max="1" onchange="changeOpacity(this.value)"></label></p>
            </form>
        </details>
    </div>
    <div class="overlay" style="position: fixed; left: 10px; bottom: 10px;">
        <details disabled>
            <summary>Lista terenów: <button onclick="save()">Zapisz</button><button onclick="load()">Otwórz</button></summary>
                <div id="territory-list">
    
                </div>
            </details>
            <button onclick="addNewTerritory()">Dodaj teren</button>
    </div>
    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <script>

        let undoStack = [];
        let redoStack = [];
        let territoryNodes = [];
        let editedTerritory = null;
        let territories = [];
        let savedOn = 0;
    
    // Initialize the map       
    let map = new maplibregl.Map({
        container: 'map-container',
        style: {
            version: 8,
            sources: {
                osm: {
                    type: 'raster',
                    tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'],
                    tileSize: 256,
                    attribution: '&copy; OpenStreetMap Contributors',
                    maxzoom: 19
                },
            },
            layers: [
                {
                    id: 'osm',
                    type: 'raster',
                    source: 'osm'
                },
            ]
        },
        center: [22, 50], // starting position [lng, lat]
        zoom: 9 // starting zoom
    });
    const canvas = map.getCanvasContainer();

    map.addControl(new maplibregl.NavigationControl({
        visualizePitch: true,
        visualizeRoll: true,
        showZoom: true,
        showCompass: true
    }));

    map.on('load', () => {
        // Add a source and layer displaying a point which will be dragged around.

        loadData(data);
        selectTerritoryForEditing(territories[0]);

    });

    map.on('click', (e) => {
        const features = map.queryRenderedFeatures(e.point);
        console.log("CLICK", features);

        if (features.length > 0 && features[0].source.startsWith('territory-source-')) {
            const territoryId = features[0].source.substring('territory-source-'.length);
            const territoryData = territories.find(t => t.id === territoryId);
            selectTerritoryForEditing(territoryData);
        } else {
            selectTerritoryForEditing(null);
        }
    });


    let data = {
        v: 1,
        territories: [
            {
                number: 1,
                name: "Teren 1",
                coords: [[22, 50], [22.2, 50], [22.1, 50.2]],
                fill: "#000088",
                stroke: "#000000",
                thickness: 5,
                opacity: 0.2
            },
            {
                number: 2,
                name: "Teren 2",
                coords: [[23, 50], [23.2, 50], [23.1, 50.2]],
                fill: "#008800",
                stroke: "#000000",
                thickness: 5,
                opacity: 0.2

            }
        ]
    }

    function loadData(data) {
        data.territories.forEach(territory => {
            loadTerritory(territory);
        });
    }

    function deleteTerritory(territory) {
        map.removeLayer(`${territory.id}-fill-layer`);
        map.removeLayer(`${territory.id}-stroke-layer`);
        map.removeSource(`territory-source-${territory.id}`);
        territory.listElement.remove();
        territories = territories.filter(t => t.id !== territory.id);
    }

    function loadTerritory(territoryData) {

        const id = crypto.randomUUID();

        const geojson = {
            'type': 'FeatureCollection',
            'features': [
                {
                    'type': 'Feature',
                    'geometry': {
                        'type': 'Polygon',
                        'coordinates': [[...territoryData.coords, territoryData.coords[0]]]
                    }
                }
            ]
        };

        map.addSource(`territory-source-${id}`, {
            'type': 'geojson',
            'data': geojson
        });

        map.addLayer({
            'id': `${id}-fill-layer`,
            'type': 'fill',
            'source': `territory-source-${id}`,
            'layout': {},
            'paint': {
                'fill-color': territoryData.fill,
                'fill-opacity': territoryData.opacity,
            }
        });

        map.addLayer({
            'id': `${id}-stroke-layer`,
            'type': 'line',
            'source': `territory-source-${id}`,
            'layout': {},
            'paint': {
                'line-color': territoryData.stroke,
                'line-width': territoryData.thickness,
            }
        }); 

        let listElement = document.createElement('territory-list-item');
        listElement.onclick = () => {
            selectTerritoryForEditing(territories.find(t => t.id === id));
        };
        document.getElementById('territory-list').appendChild(listElement);
        listElement.addEventListener('visibility-change', (event) => {
            const checked = event.detail.checked;
            if (checked) {
                showTerritory(newTerritory);
            } else {
                hideTerritory(newTerritory);
            }
        });
        
        let newTerritory = {
            id: id, 
            number: territoryData.number, 
            name: territoryData.name, 
            coords: territoryData.coords, 
            geojson: geojson, 
            fill: territoryData.fill, 
            stroke: territoryData.stroke, 
            thickness: territoryData.thickness, 
            opacity: territoryData.opacity,
            listElement: listElement
        };

        updateTerrritory(newTerritory);

        territories.push(newTerritory);
        
        return newTerritory;
    }

    function updateAllTerritories() {
        
        for (let territory of territories) {
            updateTerrritory(territory);
        }
    }

    function updateTerrritory(territoryData) {
        territoryData.geojson = {
            'type': 'FeatureCollection',
            'features': [
                {
                    'type': 'Feature',
                    'geometry': {
                        'type': 'Polygon',
                        'coordinates': [[...territoryData.coords, territoryData.coords[0]]]
                    }
                }
            ]
        };
        map.getSource(`territory-source-${territoryData.id}`).setData(territoryData.geojson);
        territoryData.listElement.setAttribute('label', `${territoryData.number} - ${territoryData.name}`);
    }

    function showTerritory(territory) {
        map.setLayoutProperty(`${territory.id}-fill-layer`, 'visibility', 'visible');
        map.setLayoutProperty(`${territory.id}-stroke-layer`, 'visibility', 'visible');
    }

    function hideTerritory(territory) {
        map.setLayoutProperty(`${territory.id}-fill-layer`, 'visibility', 'none');
        map.setLayoutProperty(`${territory.id}-stroke-layer`, 'visibility', 'none');
    }

    function removeEditingMarkers() {
        territoryNodes.forEach(node => {
            node.marker.remove();
            node.halfpoint.remove();
        });
        territoryNodes = [];
    }

    function selectTerritoryForEditing(territoryData) {
        console.log("SELECT", territoryData);
        removeEditingMarkers();

        if (editedTerritory) {
            editedTerritory.listElement.classList.remove('selected');
        }

        editedTerritory = territoryData;
        
        if (!territoryData) {
            document.getElementById('territory-form').setAttribute('disabled', '');
            return;
        } 

        territoryData.coords.forEach((point, index) => {
            createNode(point, index, territoryData.geojson, territoryNodes);
        });

        territoryData.listElement.classList.add('selected');

        let form = document.getElementById('territory-form');
        form.removeAttribute('disabled');
        document.getElementById('number-input').value = territoryData.number;
        document.getElementById('name-input').value = territoryData.name;
        document.getElementById('fill-input').value = territoryData.fill;
        document.getElementById('stroke-input').value = territoryData.stroke;
        document.getElementById('thickness-input').value = territoryData.thickness;
        document.getElementById('opacity-input').value = territoryData.opacity;
    }


    function createNode(point, index, geojson, territoryNodes) {

    
            let marker = new maplibregl.Marker({
                    draggable: true,
                    element: document.createElement('div'),
                    className: 'point-marker'
            })
                .setLngLat(point)
                .addTo(map);
            
            let halfpoint = new maplibregl.Marker({
                    draggable: true,
                    element: document.createElement('div'),
                    className: 'halfpoint-marker'
            })
                .setLngLat(getHalfpointPosition(geojson.features[0].geometry.coordinates[0][index === 0 ? geojson.features[0].geometry.coordinates[0].length - 2 : index - 1], point))
                .addTo(map);

            let node = {marker: marker, halfpoint: halfpoint, index: index};
            territoryNodes.push(node);

            marker.on('drag', () => {
                nodeDrag(node, geojson, territoryNodes);
            });

            marker.getElement().addEventListener('dblclick', (event) => {
                event.stopPropagation();
                nodeDblClick(node.index, geojson);
            });            
            
            marker.getElement().addEventListener('click', (event) => {
                event.stopPropagation();
            });

            marker.on('dragend', () => {
                nodeDragEnd(node);    
            });
            
            halfpoint.once('dragstart', () => {
                addNode(node, geojson, territoryNodes);
            });
    }

    function getHalfpointPosition(p1, p2) {return [(p1[0] + p2[0]) / 2, (p1[1] + p2[1]) / 2]}

    function addNode(node, geojson, territoryNodes) {
        if (!editedTerritory) return;

        let previousPoint = geojson.features[0].geometry.coordinates[0][node.index === 0 ? geojson.features[0].geometry.coordinates[0].length - 1 : node.index - 1];
        let nextPoint = geojson.features[0].geometry.coordinates[0][node.index];
        let point = getHalfpointPosition(previousPoint, nextPoint);
        
        let halfpoint = new maplibregl.Marker({
            draggable: true,
                element: document.createElement('div'),
                className: 'halfpoint-marker'
            })
            .setLngLat(getHalfpointPosition(previousPoint, point))
            .addTo(map);
        
        let newnode = {marker:node.halfpoint, halfpoint: halfpoint, index: node.index};
        newnode.marker.addClassName('point-marker');
        newnode.marker.removeClassName('halfpoint-marker');

        newnode.marker.on('drag', () => {
            nodeDrag(newnode, geojson, territoryNodes);
        });
        
        newnode.marker.on('dragend', () => {
            nodeDragEnd(newnode);
        });
        
        newnode.marker.getElement().addEventListener('dblclick', (event) => {
            event.stopPropagation();
            nodeDblClick(newnode.index, geojson);
        });            
        
        newnode.marker.getElement().addEventListener('click', (event) => {
            event.stopPropagation();
        });
        
        node.halfpoint = new maplibregl.Marker({
            draggable: true,
            element: document.createElement('div'),
            className: 'halfpoint-marker'
        })
        .setLngLat(getHalfpointPosition(point, nextPoint))
        .addTo(map);
        
        halfpoint.once('dragstart', () => {
            addNode(newnode, geojson, territoryNodes);
        });
        node.halfpoint.once('dragstart', () => {
            addNode(node, geojson, territoryNodes);
        });
        
        for (let i = node.index; i < territoryNodes.length; i++) {
            territoryNodes[i].index++;
        }
        
        recordChangeset([{
            id: editedTerritory.id,
            data: {
                coords: Array.from(editedTerritory.coords)
            }
        }]);
        editedTerritory.coords.splice(newnode.index, 0, point);
        territoryNodes.splice(newnode.index, 0, newnode);

        geojson.features[0].geometry.coordinates[0].splice(newnode.index, 0, point);
        map.getSource(`territory-source-${editedTerritory.id}`).setData(geojson);
    }

    function nodeDblClick(index, geojson) {
        if (!editedTerritory) return;
        if (territoryNodes.length <= 3) return;

        territoryNodes[index].marker.remove();
        territoryNodes[index].halfpoint.remove();

        territoryNodes.splice(index, 1);
        editedTerritory.coords.splice(index, 1);
        geojson.features[0].geometry.coordinates[0].splice(index, 1);

        if (index === 0) {
            geojson.features[0].geometry.coordinates[0][geojson.features[0].geometry.coordinates[0].length - 1] = geojson.features[0].geometry.coordinates[0][0];
        }


        for (let i = index; i < territoryNodes.length; i++) {
            territoryNodes[i].index--;
        }

        map.getSource(`territory-source-${editedTerritory.id}`).setData(geojson);

        // set halfpoint of next node
        territoryNodes[index % territoryNodes.length].halfpoint.setLngLat(getHalfpointPosition(geojson.features[0].geometry.coordinates[0][index === 0 ? geojson.features[0].geometry.coordinates[0].length - 1 : index - 1], geojson.features[0].geometry.coordinates[0][index]));
    }


    function nodeDrag(node, geojson, territoryNodes) {
        if (!editedTerritory) return;
        const lngLat = node.marker.getLngLat();


        geojson.features[0].geometry.coordinates[0][node.index] = [lngLat.lng, lngLat.lat];
        if (node.index === 0) {
            geojson.features[0].geometry.coordinates[0][geojson.features[0].geometry.coordinates[0].length - 1] = [lngLat.lng, lngLat.lat];
        }

        let previousPoint = node.index === 0 ? geojson.features[0].geometry.coordinates[0][geojson.features[0].geometry.coordinates[0].length - 2] : geojson.features[0].geometry.coordinates[0][node.index - 1];
        node.halfpoint.setLngLat(getHalfpointPosition(previousPoint, [lngLat.lng, lngLat.lat]));
        
        let nextPoint = node.index === territoryNodes.length - 1 ? geojson.features[0].geometry.coordinates[0][0] : geojson.features[0].geometry.coordinates[0][node.index + 1];
        territoryNodes[(node.index + 1) % territoryNodes.length].halfpoint.setLngLat(getHalfpointPosition(nextPoint, [lngLat.lng, lngLat.lat]));

        map.getSource(`territory-source-${editedTerritory.id}`).setData(geojson);
    }

    function nodeDragEnd(node) {
        let lastCoord = editedTerritory.coords[node.index];
        const lngLat = node.marker.getLngLat();

        let changeset = [{
            id: editedTerritory.id,
            data: {
                coords: Array.from(editedTerritory.coords)
            }
        }];

        editedTerritory.coords[node.index] = [lngLat.lng, lngLat.lat];

        recordChangeset(changeset);
    }


    function changeFillColor(color) {
        if (!editedTerritory) return;
        editedTerritory.fill = color;
        map.setPaintProperty(`${editedTerritory.id}-fill-layer`, 'fill-color', color);
    }

    function changeStrokeColor(color) {
        if (!editedTerritory) return;
        editedTerritory.stroke = color;
        map.setPaintProperty(`${editedTerritory.id}-stroke-layer`, 'line-color', color);
    }

    function changeStrokeWidth(width) {
        if (!editedTerritory) return;
        editedTerritory.thickness = parseFloat(width);
        map.setPaintProperty(`${editedTerritory.id}-stroke-layer`, 'line-width', parseFloat(width));
    }

    function changeOpacity(opacity) {
        if (!editedTerritory) return;
        editedTerritory.opacity = parseFloat(opacity);
        map.setPaintProperty(`${editedTerritory.id}-fill-layer`, 'fill-opacity', parseFloat(opacity));
    }

    function changeName(name) {
        if (!editedTerritory) return;
        editedTerritory.name = name;
        editedTerritory.listElement.setAttribute('label', `${editedTerritory.number} - ${editedTerritory.name}`);
    }

    function changeNumber(number) {
        if (!editedTerritory) return;
        editedTerritory.number = parseInt(number);
        editedTerritory.listElement.setAttribute('label', `${editedTerritory.number} - ${editedTerritory.name}`);
    }

    function toggleEditMode(enabled) {
        document.body.classList.toggle('edit-mode');
    }

    function addNewTerritory() {

        let center = map.getCenter();
        let size = 0.5 / map.getZoom();

        const newTerritory = {
            number: territories.length + 1,
            name: `Teren ${territories.length + 1}`,
            coords: [[center.lng - size, center.lat], [center.lng + size, center.lat], [center.lng + size, center.lat + size]],
            fill: "#000088",
            stroke: "#000000",
            thickness: 5,
            opacity: 0.2
        };
        selectTerritoryForEditing(loadTerritory(newTerritory));
    }

    function recordChangeset(changeset) {
        console.log("RECORD", changeset);
        redoStack = [];
        undoStack.push(changeset);
    }

    function performUndo() {
        if (undoStack.length === 0) return;
        const changeset = undoStack.pop();
        console.log("UNDO", changeset);
        redoStack.push(commitChangeset(changeset));
    }

    function performRedo() {
        if (redoStack.length === 0) return;
        const changeset = redoStack.pop();
        console.log("REDO", changeset);
        undoStack.push(commitChangeset(changeset));
    }

    function commitChangeset(changeset) {
        let inverseChangeset = [];

        for (let change of changeset) {
            let territory = territories.find(t => t.id === change.id);
            if (!territory) throw new Error("Territory not found for change commit");

            let previousData = {};
            for (let key in change.data) {
                previousData[key] = territory[key];
                territory[key] = change.data[key];
            }

            inverseChangeset.push({
                id: territory.id,
                data: previousData
            });
        }

        updateAllTerritories();
        if (editedTerritory) {
            selectTerritoryForEditing(editedTerritory);
        }

        return inverseChangeset;
    }

    function getJSONtoSave() {
        return {
            v: 1,
            territories: territories.map(t => ({
                number: t.number,
                name: t.name,
                coords: t.coords,
                fill: t.fill,
                stroke: t.stroke,
                thickness: t.thickness,
                opacity: t.opacity
            }))
        }
    }

    function save() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(getJSONtoSave()));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "territory.json");
        document.body.appendChild(downloadAnchorNode); // required for firefox
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
        savedOn = undoStack.length;
    }

    function load() {
        if (undoStack.length > savedOn && !window.confirm("Wczytanie pliku spowoduje utratę niezapisanych zmian. Kontynuować?")) {
            return;
        }

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (event) => {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                // Handle the loaded data
                changeProject(data);
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function changeProject(data) {
        removeEditingMarkers();
        for (let territory of territories) {
            deleteTerritory(territory);
        }
        territories = [];
        loadData(data);
        if (territories.length > 0) {
            selectTerritoryForEditing(territories[0]);
        }
    }
    


    class TerritoryListItem extends HTMLElement {

        static observedAttributes = ["label"];

        constructor() {
            super();

            this.attachShadow({ mode: 'open' });

            this.checkbox = document.createElement('input');
            this.checkbox.type = 'checkbox';
            this.checkbox.onchange = () => {
                this.dispatchEvent(new CustomEvent('visibility-change', { detail: { checked: this.checkbox.checked } }));
            };
            this.checkbox.checked = true;
            this.shadowRoot.appendChild(this.checkbox);


            this.label = document.createElement('span');
            this.shadowRoot.appendChild(this.label);
        }



        connectedCallback() {

        }

        disconnectedCallback() {
            console.log(`Custom element removed (${this.constructor.name})`);
        }

        adoptedCallback() {
            console.log(`Custom element moved to new document (${this.constructor.name})`);
        }

        attributeChangedCallback(name, oldValue, newValue) {
            if (name === 'label') {
                this.label.textContent = newValue;
            }
        }

    }


        window.customElements.define("territory-list-item", TerritoryListItem);

    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
