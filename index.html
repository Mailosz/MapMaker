<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    <style>
        html {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
            flex: 1;
        }

        #map-container {
            flex: 1;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .maplibregl-canvas-container {
            overflow: clip;
            height: 100vh;
        }

        .maplibregl-control-container {
            position: fixed;
            top: 0px;
            left: 0px;
            right: 0px;
            bottom:auto
        }

        .maplibregl-ctrl-bottom-right {
            position: fixed;
            bottom: 10px;
            right: 10px;
        }

        .maplibregl-ctrl-top-right {
            position: fixed;
            top: 10px;
            right: 10px;
        }

        .maplibregl-ctrl-group {
            display: flex;
            flex-direction: column;
        }

        .maplibregl-ctrl-zoom-in::before {
            content: '+';
            font-size: large;
        }

        .maplibregl-ctrl-zoom-out::before {
            content: '-';
            font-size: large;
        }

        .maplibregl-ctrl-compass::before {
            content: '⥈';
            font-size: large;
            cursor: all-scroll;
        }

        .maplibregl-ctrl-geolocate::before {
            font-size: large;
            content: '⛯';
        }

        .maplibregl-user-location-dot {
            width: 16px;
            height: 16px;
            background-color: maroon;
            border: 2px solid #555;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            border-radius: 50%;
        }

        .maplibregl-user-location-accuracy-circle {
            background-color: rgba(128, 0, 0, 0.2);
            border-radius: 50%;
        }

        .overlay, .maplibregl-ctrl {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            padding: 4px;
            border: 1px solid #888;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        @media print {
            .overlay, .maplibregl-ctrl {
                display: none;
            }

            .edit-mode .maplibregl-marker {
                display: none;
            }
        }

        .maplibregl-marker {
            cursor: all-scroll;
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        body:not(.edit-mode) .maplibregl-marker {
            display: none;
        }

        .maplibregl-marker.point-marker {
            padding: 8px;
            background-color: transparent;
            border: none;
            border-radius: 50%;
            z-index: 10;
        }

        .maplibregl-marker.point-marker::before {
            content: ' ';
            display: block;
            width: 12px;
            height: 12px;
            background-color: cornflowerblue;
            border: 2px solid #555;
            border-radius: 50%;
        }

        .maplibregl-marker.halfpoint-marker {
            padding: 12px;
            background-color: transparent;
            border: none;
            border-radius: 50%;
            z-index: 0;
        }

        .maplibregl-marker.halfpoint-marker::before {
            content: ' ';
            display: block;
            width: 8px;
            height: 8px;
            background-color: #99bbff;
            border: 2px solid #555;
            border-radius: 50%;
        }

        .maplibregl-marker.point-marker:hover::before,
        .maplibregl-marker.halfpoint-marker:hover::before {
            filter: brightness(1.2);
        }

        .maplibregl-marker.point-marker:active::before,
        .maplibregl-marker.halfpoint-marker:active::before {
            filter: brightness(0.8);
        }

        #territory-list {
            max-height: 50vh;
            overflow-y: auto;
            margin: 4px;
        }

        territory-list-item {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            background-color: rgba(255,255,255,0.2);
        }

        territory-list-item>button {
            background-color: inherit;
        }

        territory-list-item.selected {
            background-color: cornflowerblue;
        }

        button {
            cursor: pointer;
            padding: 0.5em 1em;
            border: none;
            background-color: #f0f3f5; 
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:active {
            filter: brightness(0.9);
        }

        summary {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 0.25em;
        }

        summary::before {
            display: block;
            content: '❯ ';
            padding: 0 0.25em;
        }

        #draft-list {
            display: flex; 
            flex-direction: column;
            max-height: 400px; 
            overflow-y: auto;
        }

        #draft-list>div {
            display: flex;
            justify-content: stretch;
        }

        #draft-list>div>:first-child {
            flex: 1;
        }

        .controls-div {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-div>button {
            font-size: large;
        }
    </style>
</head>
<body class="edit-mode">
    <div id="map-container"></div>
    <div class="overlay" style="position: fixed; top: 10px; left: 10px;">
        <label><input type="checkbox" id="edit-mode-toggle" onchange="toggleEditMode(this.checked)" checked> Tryb edycji</label>
        <button id="undo-button" onclick="performUndo()" title="Cofnij">↩</button>
        <button id="redo-button" onclick="performRedo()" title="Ponów">↪</button>

        <details>
            <summary>Dane terenu:</summary>
            <form id="territory-form" style="padding: 8px;">
                <p><label>Numer: <input id="number-input" type="number" onchange="changeNumber(this.value)"></label></p>
                <p><label>Nazwa: <input id="name-input" type="text" onchange="changeName(this.value)"></label></p>
                <p><label>Wypełnienie: <input id="fill-input" type="color" onchange="changeFillColor(this.value)"></label></p>
                <p><label>Obramowanie: <input id="stroke-input" type="color" onchange="changeStrokeColor(this.value)"></label></p>
                <p><label>Grubość kreski: <input id="thickness-input" type="range" min="1" step="0.1" max="10" onchange="changeStrokeWidth(this.value)"></label></p>
                <p><label>Przezroczystość: <input id="opacity-input" type="range" min="0" step="0.01" max="1" onchange="changeOpacity(this.value)"></label></p>
            </form>
        </details>
    </div>
    <div popover="auto" class="overlay" id="draft-popover" style="padding: 8px; max-width: 500px; text-align: center;">
        <p>Znaleziono wersję roboczą. Wybierz aby kontynuować pracę:</p>
        <p>Uwaga: poniższe projekty mogą zostać usunięte w każdej chwili. Zapisz je aby nie stracić swojej pracy.</p>
        <div id="draft-list"></div>
    </div>
    <div class="overlay" style="position: fixed; left: 10px; bottom: 10px;">
        <div popover="auto" class="overlay" id="save-popover">
            <div style="display: flex; flex-direction: column;">
                <label>Nazwa projektu: <br>
                    <input id="project-name" type="text" onchange="changeProjectName(this.value)">
                </label>
                <hr>
                <button onclick="save();closePopover(this)">Zapisz w pliku</button>
                <button onclick="load();closePopover(this)">Otwórz z pliku</button>
                <hr>
                <details>
                    <summary>Pokazuj:</summary>
                    <div style="display: flex; flex-direction: column;">
                        <label><input type="checkbox" onchange="toggleShowLayer('building_number',this.checked)" checked> Numery domów</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('poi_r1',this.checked)" checked> Wybrane miejsca</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('poi_transit',this.checked)" checked> Przystanki i parkingi</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('label_other',this.checked)" checked> Nazwy osiedli</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('label_village',this.checked)" checked> Nazwy wsi</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('boundary_9',this.checked);toggleShowLayer('boundary_3',this.checked)" checked> Granice administracyjne</label>
                    </div>
                </details>
            </div>
        </div>
        <details>
            <summary style="padding-right: 0;"><div style="display: flex; justify-content: space-between; align-items: center; padding-right: 0; flex: 1;">Lista terenów: <button popovertarget="save-popover" popovertargetaction="toggle">...</button></div></summary>
                <div id="territory-list">

                </div>
            </details>
            <div class="controls-div">
                <label><input id="show-all" type="checkbox" checked onchange="toggleShowAll(this.checked)">Pokazuj</label>
                <button onclick="addNewTerritory()" title="Dodaj teren">+</button>

            </div>
    </div>
    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <script src='./init.js'></script>
    <script src='./main.js'></script>
    <script src='./ui.js'></script>
    <script src='./io.js'></script>
    <script src="./territories-list.js"></script>
</body>
</html>
