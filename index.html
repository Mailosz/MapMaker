<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    <link rel="stylesheet" href="map.css">
    <style>
        html {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
            flex: 1;
        }

        #map-container {
            flex: 1;
            height: 100vh;
            max-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        #territory-list {
            max-height: 50vh;
            overflow-y: auto;
            margin: 4px;
        }

        territory-list-item {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            background-color: rgba(255,255,255,0.2);
        }

        territory-list-item>button {
            background-color: inherit;
        }

        territory-list-item.selected {
            background-color: cornflowerblue;
        }

        button {
            cursor: pointer;
            padding: 0.5em 1em;
            border: none;
            background-color: #f0f3f5; 
        }

        button:disabled {
            filter: grayscale();
        }

        button:enabled:hover {
            filter: brightness(1.1);
        }

        button:enabled:active {
            filter: brightness(0.9);
        }

        summary {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 0.25em;
        }

        summary::before {
            display: block;
            content: '❯ ';
            padding: 0 0.25em;
        }

        hr {
            width: calc(100% - 10px);
        }

        #draft-list {
            display: flex; 
            flex-direction: column;
            max-height: 400px; 
            overflow-y: auto;
        }

        #draft-list>div {
            display: flex;
            justify-content: stretch;
        }

        #draft-list>div>:first-child {
            flex: 1;
        }

        .controls-div {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-div>button {
            font-size: large;
        }

        [popover] {
            inset: auto;
            margin: 0;
            border: 1px solid #888;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #save-popover {
            position-area: top;
        }

        #draft-popover {    
            inset: 0;
            margin: auto;
            padding: 8px; 
            max-width: 500px; 
            text-align: center;
        }

        .more-menu:popover-open {
            position-area: right span-all;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        .territory-dialog {
            background: white;
            padding: 4px;

        }

        .buttons-container {
            position: absolute;
            top: 2px;
            right: 2px;
            display: flex;
            flex-direction: row-reverse;
            gap: 2px;
            z-index: 100;
        }

        .close-button {
            background-color: #ff3333;
            line-height: 1.2;
        }
        
        .save-button {
            background-color: #33cc33;
            line-height: 1.2;
        }

        .print-iframe {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 9999;
            background: white;
        }

        .print-div {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: white;
        }

        .print-div .buttons-container {
            z-index: 10000;
        }

        territory-list-item .label {
            flex: 1;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }
    </style>
</head>
<body class="edit-mode">
    <div id="map-container"></div>
    <div class="overlay" style="position: fixed; top: 10px; left: 10px;">
        <label><input type="checkbox" id="edit-mode-toggle" onchange="toggleEditMode(this.checked)" checked> Tryb edycji</label>
        <button id="undo-button" onclick="performUndo()" title="Cofnij">↩</button>
        <button id="redo-button" onclick="performRedo()" title="Ponów">↪</button>

        <details>
            <summary>Dane terenu:</summary>
            <form id="territory-form" style="padding: 8px;">
                <p><label>Numer: <input id="number-input" type="number" onchange="changeNumber(this.value)"></label></p>
                <p><label>Nazwa: <input id="name-input" type="text" onchange="changeName(this.value)"></label></p>
                <p><label>Wypełnienie: <input id="fill-input" type="color" onchange="changeFillColor(this.value)"></label></p>
                <p><label>Obramowanie: <input id="stroke-input" type="color" onchange="changeStrokeColor(this.value)"></label></p>
                <p><label>Grubość kreski: <input id="thickness-input" type="range" min="1" step="0.1" max="10" onchange="changeStrokeWidth(this.value)"></label></p>
                <p><label>Przezroczystość: <input id="opacity-input" type="range" min="0" step="0.01" max="1" onchange="changeOpacity(this.value)"></label></p>
            </form>
        </details>
    </div>
    <div popover="auto" class="overlay" id="draft-popover">
        <p>Znaleziono wersję roboczą. Wybierz aby kontynuować pracę:</p>
        <p>Uwaga: poniższe projekty mogą zostać usunięte w każdej chwili. Zapisz je aby nie stracić swojej pracy.</p>
        <div id="draft-list"></div>
    </div>
    <div class="overlay" style="position: fixed; left: 10px; bottom: 10px; max-width: 35%;">
        <div popover="auto" class="overlay" id="save-popover">
            <div style="display: flex; flex-direction: column;">
                <label>Nazwa projektu: <br>
                    <input id="project-name" type="text" onchange="changeProjectName(this.value)">
                </label>
                <hr>
                <button onclick="save();closePopover(this)">Zapisz w pliku</button>
                <button onclick="load();closePopover(this)">Otwórz z pliku</button>
                <hr>
                <button onclick="print();closePopover(this)">Drukuj</button>
                <hr>
                <details>
                    <summary>Pokazuj:</summary>
                    <div style="display: flex; flex-direction: column;">
                        <label><input type="checkbox" onchange="toggleShowLayer('building-number',this.checked)" checked> Numery domów</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('poi_r1',this.checked)" checked> Wybrane miejsca</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('poi_transit',this.checked)" checked> Przystanki i parkingi</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('label_other',this.checked)" checked> Nazwy osiedli</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('label_village',this.checked)" checked> Nazwy wsi</label>
                        <label><input type="checkbox" onchange="toggleShowLayer('boundary_9',this.checked);toggleShowLayer('boundary_3',this.checked)" checked> Granice administracyjne</label>
                    </div>
                </details>
            </div>
        </div>
        <details>
            <summary style="padding-right: 0;"><div style="display: flex; justify-content: space-between; align-items: center; padding-right: 0; flex: 1;">Lista terenów: <button popovertarget="save-popover" popovertargetaction="toggle">...</button></div></summary>
            <div id="territory-list">

            </div>
        </details>
        <div class="controls-div">
            <label><input id="show-all" type="checkbox" checked onchange="toggleShowAll(this.checked)">Pokazuj</label>
            <button onclick="addNewTerritory()" title="Dodaj teren">+</button>

        </div>
    </div>
    <!-- <dialog class="overlay territory-dialog" open>
        <button class="close-button" onclick="this.parentElement.close()">X</button>
        <territory-card id="territory-card" title="Teren 122" description="Opis terenu"></territory-card>
    </dialog> -->
    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <script src='./init.js'></script>
    <script src='./main.js'></script>
    <script src='./ui.js'></script>
    <script src='./io.js'></script>
    <script src="./territories-list.js"></script>
    <script type="module" src="./territory-card.js"></script>
</body>
</html>
